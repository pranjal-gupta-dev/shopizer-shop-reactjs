name: Shopizer Shop CI/CD

on:
  push:
    branches: [main, develop, ci-pipeline]
  pull_request:
    branches: [main, develop, ci-pipeline]
  workflow_dispatch:

env:
  NODE_VERSION: '14'
  DOCKER_IMAGE: shopizerecomm/shopizer-shop

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linting
        run: npm run lint
        continue-on-error: true
      
      - name: Run unit tests
        run: npm test -- --coverage --watchAll=false
        env:
          CI: true
      
      - name: Build production
        run: npm run build
        env:
          CI: false
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./shopizer-shop-reactjs/coverage/lcov.info
          flags: shop-unittests
          name: codecov-shop
        continue-on-error: true
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: shop-build
          path: shopizer-shop-reactjs/build/
          retention-days: 7

  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: build-and-test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linting with report
        run: npm run lint
        continue-on-error: true
      
      - name: SonarCloud Scan
        if: github.event_name == 'push'
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: shopizer-shop-reactjs
        continue-on-error: true

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build-and-test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true
      
      - name: Secret scanning
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./shopizer-shop-reactjs
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
        continue-on-error: true

  docker-build:
    name: Build Docker Image and Save Artifact
    runs-on: ubuntu-latest
    needs: [build-and-test, security-scan]
    if: github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: shop-build
          path: build/
      
      - name: Verify build artifacts
        run: |
          ls -lh build/
          echo "✅ Build artifacts downloaded"
      
      - name: Build Docker image
        run: |
          DOCKER_BUILDKIT=0 docker build -t shopizerecomm/shopizer-shop:latest .
          echo "✅ Docker image built successfully"
      
      - name: Test image
        run: |
          docker run --rm -d --name test-shop -p 3001:80 shopizerecomm/shopizer-shop:latest
          sleep 5
          docker stop test-shop
          echo "✅ Image validation passed"
      
      - name: Save image as compressed artifact
        run: |
          echo "💾 Saving image (this may take 1-2 minutes)..."
          DOCKER_BUILDKIT=0 docker save shopizerecomm/shopizer-shop:latest | gzip > shopizer-shop-image.tar.gz
          ls -lh shopizer-shop-image.tar.gz
          echo "✅ Image saved as artifact"
      
      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: shop-docker-image
          path: shopizer-shop-image.tar.gz
          retention-days: 7
          compression-level: 0
      
      - name: Deployment Instructions
        run: |
          echo "════════════════════════════════════════════════════"
          echo "✅ Docker image saved as artifact: shop-docker-image"
          echo "════════════════════════════════════════════════════"
          echo ""
          echo "📥 To deploy on local Colima:"
          echo ""
          echo "1. Download artifact:"
          echo "   gh run download ${{ github.run_id }} --name shop-docker-image"
          echo ""
          echo "2. Load image:"
          echo "   gunzip -c shopizer-shop-image.tar.gz | docker load"
          echo ""
          echo "3. Run container:"
          echo "   docker run -d -p 3000:80 --name shopizer-shop shopizerecomm/shopizer-shop:latest"
          echo ""
          echo "════════════════════════════════════════════════════"

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment:
      name: staging
      url: https://shop-staging.shopizer.com
    
    steps:
      - name: Deploy to staging
        run: echo "Deploy shop to staging environment"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://shop.shopizer.com
    
    steps:
      - name: Deploy to production
        run: echo "Deploy shop to production environment"
