name: Shopizer Shop Build

on:
  push:
    branches: [main, develop, ci-pipeline]
  workflow_dispatch:

env:
  NODE_VERSION: '14'

jobs:
  build:
    name: Build React App
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build production
        run: npm run build
        env:
          CI: false
      
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: shop-build
          path: build/
          retention-days: 7

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/ci-pipeline')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: shop-build
          path: build/
      
      - name: Verify build exists
        run: |
          ls -lh build/
          echo "✅ Build artifact downloaded"
      
      - name: Build Docker image
        run: |
          DOCKER_BUILDKIT=0 docker build -t shopizer-shop:latest .
          echo "✅ Docker image built"
      
      - name: Test image
        run: |
          docker run --rm -d -p 8081:80 --name test-shop shopizer-shop:latest
          sleep 5
          curl -f http://localhost:8081 || exit 1
          docker stop test-shop
          echo "✅ Image validated"
      
      - name: Save image as artifact
        run: |
          docker save shopizer-shop:latest | gzip > shopizer-shop-image.tar.gz
          ls -lh shopizer-shop-image.tar.gz
          echo "✅ Image saved"
      
      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: shop-docker-image
          path: shopizer-shop-image.tar.gz
          retention-days: 7
          compression-level: 0
