name: Shopizer Shop Build

on:
  push:
    branches: [main, develop, ci-pipeline]
  workflow_dispatch:

env:
  NODE_VERSION: '14'

jobs:
  build:
    name: Build React App
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build production
        run: npm run build
        env:
          CI: false
      
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: shop-build
          path: build/
          retention-days: 7
